# .github/workflows/build-windows.yml
#
# Project:Nova — Windows build & release pipeline.
#
# This workflow:
#   1. Builds four Windows binaries on every push / PR / tag:
#        - nova.exe             (amd64, console subsystem — the CLI)
#        - nova-tray.exe        (amd64, GUI subsystem — the desktop tray app)
#        - nova-arm64.exe       (arm64, console subsystem — Windows on ARM)
#        - nova-tray-arm64.exe  (arm64, GUI subsystem — tray app on ARM)
#   2. Runs `go vet` and `go test` (tests are best-effort: the stub runner is
#      used in CI and some tests may be skipped).
#   3. Packages a portable .zip with nova.exe + nova-tray.exe.
#   4. Uploads the binaries + zip as a workflow artifact on every run.
#   5. On `v*` tags, publishes a GitHub Release with all artifacts attached.
#
# Replace `<owner>` in README.md and scripts/install.ps1 with the actual GitHub
# user or organisation that owns this repository.

name: Build Windows

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (defaults to the branch the workflow runs on)'
        required: false
        default: ''

# Restrict GITHUB_TOKEN permissions to the minimum required.
permissions:
  contents: write   # required by softprops/action-gh-release to upload release assets
  packages: read

# Cancel any superseded run on the same ref to save CI minutes.
concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows binaries
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      # ---- Checkout (full history for `git describe`) ----------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for `git describe --tags`

      # ---- Go toolchain ----------------------------------------------------
      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false   # we use actions/cache below for finer control

      # ---- Module cache ----------------------------------------------------
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~\AppData\Local\go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # ---- Build metadata (version / commit / date) ------------------------
      # These are injected via -ldflags into internal/version.
      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0")"
          COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          # Strip a leading 'v' from tag-based versions for the MSI filename
          # but keep the raw VERSION for the binary (matches Ollama convention).
          echo "VERSION=${VERSION}"                 >> "$GITHUB_ENV"
          echo "COMMIT=${COMMIT}"                   >> "$GITHUB_ENV"
          echo "BUILD_DATE=${BUILD_DATE}"           >> "$GITHUB_ENV"
          echo "VERSION_TRIM=${VERSION#v}"          >> "$GITHUB_ENV"
          {
            echo "version=${VERSION}"
            echo "commit=${COMMIT}"
          } >> "$GITHUB_OUTPUT"

      - name: Show build metadata
        shell: bash
        run: |
          echo "VERSION     = ${{ env.VERSION }}"
          echo "COMMIT      = ${{ env.COMMIT }}"
          echo "BUILD_DATE  = ${{ env.BUILD_DATE }}"
          echo "GO          = $(go version)"

      # ---- Dependencies ----------------------------------------------------
      - name: Download module dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      # ---- Static analysis -------------------------------------------------
      - name: Run go vet
        run: go vet ./...

      # ---- Tests (best-effort: stub runner may skip integration tests) -----
      - name: Run unit tests
        continue-on-error: true
        run: go test ./... -count=1

      # ---- Build: nova.exe (amd64, console subsystem) ----------------------
      - name: Build nova.exe (amd64, console)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-s -w \
            -X github.com/project-nova/nova/internal/version.Version=${VERSION} \
            -X github.com/project-nova/nova/internal/version.Commit=${COMMIT} \
            -X github.com/project-nova/nova/internal/version.BuildDate=${BUILD_DATE}"
          GOOS=windows GOARCH=amd64 \
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nova.exe ./cmd/nova
          echo "Built dist/nova.exe"

      # ---- Build: nova-tray.exe (amd64, GUI subsystem — no console) -------
      - name: Build nova-tray.exe (amd64, GUI subsystem)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-s -w -H=windowsgui \
            -X github.com/project-nova/nova/internal/version.Version=${VERSION} \
            -X github.com/project-nova/nova/internal/version.Commit=${COMMIT} \
            -X github.com/project-nova/nova/internal/version.BuildDate=${BUILD_DATE}"
          GOOS=windows GOARCH=amd64 \
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nova-tray.exe ./cmd/nova
          echo "Built dist/nova-tray.exe"

      # ---- Build: nova-arm64.exe (arm64, console subsystem) ---------------
      - name: Build nova-arm64.exe (arm64, console)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-s -w \
            -X github.com/project-nova/nova/internal/version.Version=${VERSION} \
            -X github.com/project-nova/nova/internal/version.Commit=${COMMIT} \
            -X github.com/project-nova/nova/internal/version.BuildDate=${BUILD_DATE}"
          GOOS=windows GOARCH=arm64 \
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nova-arm64.exe ./cmd/nova
          echo "Built dist/nova-arm64.exe"

      # ---- Build: nova-tray-arm64.exe (arm64, GUI subsystem) --------------
      - name: Build nova-tray-arm64.exe (arm64, GUI subsystem)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-s -w -H=windowsgui \
            -X github.com/project-nova/nova/internal/version.Version=${VERSION} \
            -X github.com/project-nova/nova/internal/version.Commit=${COMMIT} \
            -X github.com/project-nova/nova/internal/version.BuildDate=${BUILD_DATE}"
          GOOS=windows GOARCH=arm64 \
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o dist/nova-tray-arm64.exe ./cmd/nova
          echo "Built dist/nova-tray-arm64.exe"

      # ---- Verify outputs --------------------------------------------------
      - name: List build outputs
        shell: bash
        run: |
          ls -la dist/
          echo "---"
          file dist/*.exe || true

      # ---- Portable .zip (always, used by releases & install script) ------
      - name: Package portable .zip
        shell: pwsh
        run: |
          $zip = "dist/nova-${env:VERSION}-windows-amd64.zip"
          $files = @('dist/nova.exe', 'dist/nova-tray.exe')
          # Only include files that exist (belt and braces).
          $files = $files | Where-Object { Test-Path $_ }
          Compress-Archive -Path $files -DestinationPath $zip -Force
          Write-Host "Created $zip"
          Get-Item $zip | Format-List Name, Length

      # ---- Upload workflow artifact (every run) ---------------------------
      - name: Upload Windows binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-windows-amd64
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------- #
  # Release job: only on `v*` tags.                                         #
  # ---------------------------------------------------------------------- #
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release tag
        id: rel
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"   >> "$GITHUB_OUTPUT"

      # Re-run the Windows build inside the release job so we have a clean
      # artifact set to attach. We reuse the build job's outputs by downloading
      # the workflow artifact instead.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nova-windows-amd64
          path: dist

      - name: Inspect downloaded artifacts
        shell: bash
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: Project:Nova ${{ steps.rel.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.rel.outputs.tag, '-') }}
          files: |
            dist/*.exe
            dist/*.zip
          body: |
            ## Project:Nova ${{ steps.rel.outputs.tag }}

            ### Downloads

            | File | Architecture | Subsystem | Use |
            | --- | --- | --- | --- |
            | `nova.exe` | amd64 | console | CLI / `nova serve` from a terminal |
            | `nova-tray.exe` | amd64 | GUI | Desktop tray app (double-click) |
            | `nova-arm64.exe` | arm64 | console | CLI on Windows-on-ARM |
            | `nova-tray-arm64.exe` | arm64 | GUI | Tray app on Windows-on-ARM |
            | `nova-${{ steps.rel.outputs.tag }}-windows-amd64.zip` | amd64 | portable bundle | Both binaries in one zip |

            ### Install (one-liner)

            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.ps1 | iex
            ```

            ### Verify

            ```powershell
            nova --version
            ```

            ---
            *Built from commit `${{ github.sha }}`.*
